{% extends 'base.html' %}
{% block content %}

<div class="row">
    <div class="col-md-6">
        <img src="{{ product.image.url }}" width="100%">
    </div>
    <div class="col-md-6">
        <h2>{{ product.name }}</h2>
        <h4>₹{{ product.price }}</h4>
        <p>{{ product.description }}</p>
        <a href="/add-to-cart/{{ product.id }}/" class="btn btn-success">Add to Cart</a>
    </div>
</div>

{% endblock %}
