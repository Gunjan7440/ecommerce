{% extends 'base.html' %}
{% block content %}

<div class="container-fluid">
    <div class="row vh-100">

        <!-- Left Side Branding -->
        <div class="col-md-6 d-none d-md-flex bg-primary text-white 
                    align-items-center justify-content-center">
            <div class="text-center p-5">
                <h1 class="fw-bold mb-3">MyStore</h1>
                <p class="lead">
                    Login to explore amazing deals, track your orders 
                    and enjoy seamless shopping experience.
                </p>
            </div>
        </div>

        <!-- Right Side Login Card -->
        <div class="col-md-6 d-flex align-items-center justify-content-center bg-light">

            <div class="card shadow-lg border-0 p-5" style="width: 400px; border-radius:15px;">
                
                <h3 class="text-center mb-4 fw-bold">Welcome Back 👋</h3>

                <form method="POST">
                    {% csrf_token %}

                    <!-- Username -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Username</label>
                        <input type="text" name="username" 
                               class="form-control form-control-lg"
                               placeholder="Enter your username" required>
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" 
                               class="form-control form-control-lg"
                               placeholder="Enter your password" required>
                    </div>

                    <!-- Remember & Forgot -->
                    <div class="d-flex justify-content-between mb-3">
                        <div>
                            <input type="checkbox" class="form-check-input">
                            <label class="form-check-label small">Remember me</label>
                        </div>
                        <a href="#" class="small text-decoration-none">
                            Forgot Password?
                        </a>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" 
                            class="btn btn-primary btn-lg w-100 shadow-sm">
                        Login
                    </button>

                    <!-- Register Link -->
                    <p class="text-center mt-3 small">
                        New here?
                        <a href="{% url 'register' %}" 
                           class="text-decoration-none fw-semibold">
                           Create Account
                        </a>
                    </p>

                </form>
            </div>
        </div>

    </div>
</div>

{% endblock %}
